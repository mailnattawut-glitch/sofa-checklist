<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280">
    <title>ใบตรวจเช็กสินค้าขึ้นรถขนส่งโซฟา (Sofa Loading Checklist)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Sarabun', 'Inter', sans-serif; background-color: #f1f5f9; }
        @media print { .no-print { display: none !important; } }
    </style>
</head>
<body>

<script>
    // --- ตั้งค่า SUPABASE ---
    const SUPABASE_URL = "https://mejfntodbvatmxjknqqy.supabase.co";
    const SUPABASE_KEY = "sb_publishable_9Ap8QZR9sP0gKgA1lwgzRg_BUs72U2D";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    let isDriverMode = false;

    // --- ฟังก์ชันหลักที่แก้ไขใหม่ ---
    async function initApp() {
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('mode');
        const job = urlParams.get('job');

        if (mode === 'driver') {
            isDriverMode = true;
            document.body.classList.add('driver-mode');
            
            // ซ่อนแถบแอดมิน
            const adminBar = document.getElementById('admin-control-bar');
            if (adminBar) adminBar.style.display = 'none';

            // สร้างปุ่มบันทึกให้คนขับ
            const btn = document.createElement("button");
            btn.innerText = "💾 บันทึกข้อมูลใบงาน";
            btn.style.cssText = "position:fixed; bottom:20px; right:20px; padding:15px 30px; background:#0d9488; color:white; border-radius:12px; z-index:9999; font-weight:bold; box-shadow:0 4px 6px rgba(0,0,0,0.2);";
            btn.onclick = saveCurrentSheetToSupabase;
            document.body.appendChild(btn);

            // ปลดล็อกช่องคนขับ
            setTimeout(() => {
                ['cfg-remarks', 'cfg-location-select', 'cfg-location-custom'].forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.disabled = false;
                });
            }, 500);

            if (job) await loadSupabaseSheet(job);
        } else {
            // โหมด Admin: เริ่มหน้าว่างเสมอ ไม่โหลดจ๊อบค้าง
            isDriverMode = false;
            localStorage.removeItem('last_admin_job');
            document.getElementById('cfg-job').value = '';
        }
        syncHeader();
    }

    // --- ฟังก์ชันโหลดข้อมูล (ดึงล่าสุด) ---
    async function loadSupabaseSheet(jobNo) {
        try {
            const { data, error } = await _supabase
                .from('dispatch_sheets')
                .select('*')
                .eq('job', jobNo)
                .order('created_at', { ascending: false })
                .limit(1)
                .maybeSingle();

            if (data && !error) {
                applySheetDataSnapshot(data);
                showNotification(`โหลดข้อมูลสำเร็จ`);
            } else {
                showNotification("ไม่พบข้อมูลจ๊อบนี้", false);
            }
        } catch (err) {
            showNotification("เกิดข้อผิดพลาด", false);
        }
    }

    // --- ฟังก์ชันบันทึกข้อมูล (อัปเดต Remark/Location) ---
    async function saveCurrentSheetToSupabase() {
        const primaryJob = document.getElementById('cfg-job').value.split(',')[0].trim();
        if (!primaryJob) return showNotification("ระบุเลขที่จ๊อบก่อน", false);

        const payload = {
            job: primaryJob,
            customer: document.getElementById('cfg-customer').value,
            truck: document.getElementById('cfg-truck').value,
            delivery_date: document.getElementById('cfg-date').value,
            time_start: document.getElementById('cfg-time-start').value,
            time_end: document.getElementById('cfg-date-ready').value || '',
            remarks: document.getElementById('cfg-remarks').value,
            location: (document.getElementById('cfg-location-select').value === 'other') ? 
                       document.getElementById('cfg-location-custom').value : 
                       document.getElementById('cfg-location-select').value,
            rows_data: getSheetRowsData(),
            evidence_images: [] // (ใส่ฟังก์ชันดึงรูปภาพเดิมของคุณตรงนี้)
        };

        const { error } = await _supabase.from('dispatch_sheets').upsert([payload]);
        if (error) {
            showNotification("บันทึกไม่สำเร็จ: " + error.message, false);
        } else {
            showNotification("บันทึกข้อมูลเรียบร้อยแล้ว");
        }
    }

    window.onload = initApp;
</script>
</body>
</html>
